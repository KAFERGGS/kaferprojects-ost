<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>KaferSeries</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:'Inter',sans-serif;overflow:hidden;background:var(--bg,#0a0a1a);color:#fff;transition:background .8s cubic-bezier(.22,1,.36,1);display:flex;flex-direction:column}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.06);border-radius:2px}
::-webkit-scrollbar-track{background:transparent}

/* ====== BUBBLE BG ====== */
#bubbles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden;opacity:var(--bub-op,0.15)}
.bub{position:absolute;border-radius:50%;background:var(--prim,#ff6b9d);animation:bubFloat var(--bub-d,8s) ease-in-out infinite;opacity:.06;pointer-events:none}
.bub:nth-child(1){width:180px;height:180px;left:10%;--bub-d:11s;animation-delay:-2s}
.bub:nth-child(2){width:250px;height:250px;right:15%;top:30%;--bub-d:14s;animation-delay:-5s}
.bub:nth-child(3){width:120px;height:120px;left:50%;top:60%;--bub-d:9s;animation-delay:-1s}
.bub:nth-child(4){width:300px;height:300px;left:70%;top:10%;--bub-d:16s;animation-delay:-7s;background:var(--sec,#6b9dff)}
.bub:nth-child(5){width:100px;height:100px;left:20%;top:70%;--bub-d:7s;animation-delay:-3s;background:var(--sec,#6b9dff)}
.bub:nth-child(6){width:200px;height:200px;right:5%;bottom:10%;--bub-d:12s;animation-delay:-4s}
@keyframes bubFloat{0%,100%{transform:translateY(0) scale(1);opacity:.04}25%{transform:translateY(-40px) scale(1.05);opacity:.08}50%{transform:translateY(-15px) scale(.95);opacity:.05}75%{transform:translateY(-55px) scale(1.02);opacity:.07}}

/* ====== TOP ====== */
.top{display:flex;align-items:center;gap:10px;padding:8px 20px;height:60px;flex-shrink:0;z-index:100;position:relative;background:rgba(0,0,0,.25);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border-bottom:1px solid rgba(255,255,255,.04)}
.top::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--prim),transparent);opacity:.3}
.top .logo{font-size:17px;font-weight:800;display:flex;align-items:center;gap:8px;cursor:default}
.top .logo .k{width:28px;height:28px;border-radius:7px;display:inline-flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;background:var(--prim,#ff6b9d);color:#000;transition:.3s;box-shadow:0 0 20px color-mix(in srgb,var(--prim) 40%,transparent)}
.top .logo:hover .k{transform:rotate(-10deg) scale(1.05)}
.top .sp{flex:1}
.top .sc{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.05);border-radius:12px;padding:7px 14px;max-width:320px;width:100%;transition:.3s;cursor:pointer}
.top .sc:hover{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.08)}
.top .sc span{color:rgba(255,255,255,.2);font-size:14px}
.top .sc .ph{font-size:12px;color:rgba(255,255,255,.2);flex:1}
.top .ac{display:flex;gap:5px}
.top .ac button{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.05);border-radius:9px;width:34px;height:34px;color:rgba(255,255,255,.35);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:.25s;position:relative}
.top .ac button:hover{background:rgba(255,255,255,.08);color:#fff;border-color:var(--prim);transform:translateY(-1px)}

/* ====== LAYOUT ====== */
.lyt{display:flex;flex:1;min-height:0;position:relative;z-index:1}
.sb{width:220px;padding:16px 10px;display:flex;flex-direction:column;gap:6px;flex-shrink:0;overflow-y:auto;background:rgba(0,0,0,.1);border-right:1px solid rgba(255,255,255,.03)}
.sb .tl{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:rgba(255,255,255,.12);font-weight:700;padding:6px 8px 2px;margin-top:4px}
.sb .it{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:10px;cursor:pointer;transition:.25s;border:1px solid transparent;font-size:12px;font-weight:500;position:relative;overflow:hidden}
.sb .it::before{content:'';position:absolute;inset:0;background:var(--prim);opacity:0;transition:.25s;border-radius:10px}
.sb .it:hover{background:rgba(255,255,255,.03);border-color:rgba(255,255,255,.04)}
.sb .it.on{background:rgba(255,255,255,.04);border-color:var(--prim);color:#fff;font-weight:600}
.sb .it.on .ct{color:var(--prim)}
.sb .it .ic,.sb .it .nm{position:relative;z-index:1}
.sb .it .ct{font-size:10px;color:rgba(255,255,255,.15);margin-left:auto;position:relative;z-index:1;font-weight:600}
.sb .it .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ====== MAIN ====== */
.ct{flex:1;display:flex;flex-direction:column;min-height:0;padding:16px 22px 18px;overflow:hidden}
.ct-h{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-shrink:0;animation:fi .4s}
.ct-h h2{font-size:20px;font-weight:800;background:linear-gradient(135deg,#fff 40%,rgba(255,255,255,.5));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.ct-h .sub{font-size:11px;color:rgba(255,255,255,.2);font-weight:400;-webkit-text-fill-color:rgba(255,255,255,.2)}
.ct-h .sp{flex:1}
.ct-h .fl{display:flex;gap:3px;background:rgba(255,255,255,.03);border-radius:8px;padding:2px}
.ct-h .fl button{padding:5px 12px;border-radius:6px;background:transparent;border:none;color:rgba(255,255,255,.25);cursor:pointer;font-size:11px;font-weight:600;font-family:inherit;transition:.2s}
.ct-h .fl button:hover{color:rgba(255,255,255,.5)}
.ct-h .fl button.on{background:var(--prim);color:#000;box-shadow:0 4px 15px color-mix(in srgb,var(--prim) 30%,transparent)}
.ct-w{flex:1;overflow-y:auto;min-height:0;padding-right:4px;scroll-behavior:smooth}

/* ====== EMPTY ====== */
.emp{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:80px 20px;animation:fi .6s}
.emp .ic{font-size:56px;margin-bottom:12px;opacity:.06;filter:grayscale(1)}
.emp h3{font-size:16px;font-weight:700;color:rgba(255,255,255,.4);margin-bottom:4px}
.emp p{font-size:12px;color:rgba(255,255,255,.15)}
.emp button{margin-top:10px;padding:9px 22px;background:var(--prim);color:#000;border:none;border-radius:10px;cursor:pointer;font-weight:700;font-size:12px;font-family:inherit;transition:.3s;box-shadow:0 4px 20px color-mix(in srgb,var(--prim) 25%,transparent)}
.emp button:hover{transform:translateY(-2px);box-shadow:0 8px 30px color-mix(in srgb,var(--prim) 35%,transparent)}

/* ====== GRID ====== */
.gr{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:14px;padding:4px 0}

/* ====== CARD ====== */
.cd{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);border-radius:14px;overflow:hidden;transition:.4s cubic-bezier(.22,1,.36,1);cursor:pointer;position:relative;animation:cdIn .45s both;backdrop-filter:blur(10px)}
.cd::before{content:'';position:absolute;inset:0;border-radius:14px;opacity:0;transition:.4s;background:linear-gradient(135deg,color-mix(in srgb,var(--prim) 15%,transparent),transparent 60%);pointer-events:none}
.cd:hover{transform:translateY(-6px);border-color:var(--prim);box-shadow:0 16px 48px rgba(0,0,0,.4),0 0 30px color-mix(in srgb,var(--prim) 10%,transparent)}
.cd:hover::before{opacity:1}
.cd .img{width:100%;aspect-ratio:2/3;background:rgba(0,0,0,.2);display:flex;align-items:center;justify-content:center;font-size:32px;color:rgba(255,255,255,.03);overflow:hidden;position:relative;transition:.4s}
.cd:hover .img{filter:brightness(1.08)}
.cd .img img{width:100%;height:100%;object-fit:cover;display:block;transition:.4s}
.cd:hover .img img{transform:scale(1.03)}
.cd .img .rt{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.5);backdrop-filter:blur(12px);padding:3px 9px;border-radius:7px;font-size:11px;font-weight:700;color:var(--prim);border:1px solid rgba(255,255,255,.05);opacity:0;transform:translateY(-5px);transition:.3s}
.cd .img .rt.show{opacity:1;transform:translateY(0)}
.cd:hover .img .rt{opacity:1;transform:translateY(0)}
.cd .bd{padding:11px 12px 14px;position:relative;z-index:1}
.cd .bd .nm{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:3px}
.cd .bd .tp{font-size:9px;color:rgba(255,255,255,.15);text-transform:uppercase;letter-spacing:.5px}
.cd .bd .rt2{display:flex;align-items:center;gap:5px;margin-top:7px;padding-top:7px;border-top:1px solid rgba(255,255,255,.04)}
.cd .bd .rt2 .ns{font-size:16px;font-weight:800;transition:.3s}
.cd .bd .rt2 .st{color:rgba(255,255,255,.15);font-size:10px}
.cd .del{position:absolute;top:8px;left:8px;width:26px;height:26px;border-radius:7px;background:rgba(231,76,60,.15);backdrop-filter:blur(10px);border:none;color:#e74c3c;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;opacity:0;transform:scale(.8);transition:.25s;z-index:2}
.cd:hover .del{opacity:1;transform:scale(1)}
.cd .del:hover{background:rgba(231,76,60,.3);transform:scale(1.1)!important}

/* ====== LIST VIEW ====== */
.lv{display:flex;flex-direction:column;gap:5px;padding:2px 0}
.li{display:flex;align-items:center;gap:12px;padding:7px 12px;border-radius:10px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.03);cursor:pointer;transition:.25s;animation:cdIn .3s both}
.li:hover{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.06);transform:translateX(3px)}
.li .im{width:34px;height:48px;border-radius:5px;overflow:hidden;flex-shrink:0;background:rgba(0,0,0,.2);display:flex;align-items:center;justify-content:center;font-size:10px;color:rgba(255,255,255,.05)}
.li .im img{width:100%;height:100%;object-fit:cover;display:block}
.li .nf{flex:1;min-width:0}
.li .nf .nm{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.li .nf .tp{font-size:9px;color:rgba(255,255,255,.15);margin-top:1px}
.li .rt{font-size:16px;font-weight:800;color:var(--prim);min-width:30px;text-align:right;transition:.3s}
.li .no-rt{font-size:11px;color:rgba(255,255,255,.08);min-width:30px;text-align:right}
.li .del2{background:none;border:none;color:rgba(255,255,255,.08);cursor:pointer;font-size:10px;padding:3px 5px;border-radius:4px;transition:.2s;opacity:0}
.li:hover .del2{opacity:1}
.li .del2:hover{color:#e74c3c;background:rgba(231,76,60,.1)}

/* ====== TOP 20 LIST ====== */
.tl-l{display:flex;flex-direction:column;gap:6px;padding:4px 0}
.tl-i{display:flex;align-items:center;gap:12px;padding:9px 14px;border-radius:12px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);transition:.3s;cursor:grab;animation:cdIn .35s both}
.tl-i:hover{background:rgba(255,255,255,.04);border-color:var(--prim)}
.tl-i:active{cursor:grabbing;transform:scale(1.02)}
.tl-i .rk{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;background:rgba(255,255,255,.04);color:rgba(255,255,255,.3);flex-shrink:0;transition:.3s}
.tl-i .rk.gold{background:linear-gradient(135deg,#ffd700,#ffaa00);color:#000;box-shadow:0 3px 15px rgba(255,215,0,.3)}
.tl-i .rk.silver{background:linear-gradient(135deg,#e0e0e0,#b0b0b0);color:#1a1a2e;box-shadow:0 3px 15px rgba(192,192,192,.2)}
.tl-i .rk.bronze{background:linear-gradient(135deg,#cd7f32,#a0622e);color:#fff;box-shadow:0 3px 15px rgba(205,127,50,.2)}
.tl-i .im{width:34px;height:48px;border-radius:5px;overflow:hidden;flex-shrink:0;background:rgba(0,0,0,.2);display:flex;align-items:center;justify-content:center;font-size:10px;color:rgba(255,255,255,.05)}
.tl-i .im img{width:100%;height:100%;object-fit:cover;display:block}
.tl-i .nf{flex:1;min-width:0}
.tl-i .nf .nm{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tl-i .nf .tp{font-size:9px;color:rgba(255,255,255,.15)}
.tl-i .rt{font-size:17px;font-weight:800;color:var(--prim)}
.tl-i .act{display:flex;gap:2px}
.tl-i .act button{background:none;border:none;color:rgba(255,255,255,.12);cursor:pointer;font-size:11px;padding:3px;border-radius:4px;transition:.2s}
.tl-i .act button:hover{color:var(--prim);background:rgba(255,255,255,.04)}
.tl-i .act button:nth-child(2){font-size:9px;padding:4px 5px}
.tl-i .act button:nth-child(3){font-size:9px;padding:4px 5px}
.tl-i .act button:nth-child(2):hover{color:#4ade80}
.tl-i .act button:nth-child(3):hover{color:#f87171}
.tl-i .act button:nth-child(4):hover{color:#e74c3c!important}
.tl-i.empty{border:1px dashed rgba(255,255,255,.04);background:rgba(255,255,255,.005)}
.tl-i.empty:hover{border-color:var(--prim);background:rgba(255,255,255,.015)}

/* ====== SEARCH OVERLAY ====== */
.so{position:fixed;top:0;left:0;width:100%;height:100%;z-index:500;display:none;backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px)}
.so.on{display:flex;animation:fi .25s}
.so .bg{position:absolute;inset:0;background:rgba(0,0,0,.4)}
.so-c{width:100%;max-width:560px;margin:auto;max-height:80vh;display:flex;flex-direction:column;position:relative;z-index:1}
.so-h{display:flex;align-items:center;gap:8px;padding:14px 18px;background:rgba(20,20,30,.85);border:1px solid rgba(255,255,255,.05);border-radius:16px 16px 0 0;backdrop-filter:blur(30px)}
.so-h input{flex:1;background:none;border:none;outline:none;color:#fff;font-size:14px;font-family:inherit}
.so-h input::placeholder{color:rgba(255,255,255,.15)}
.so-h .src{font-size:10px;cursor:pointer;padding:5px 12px;border-radius:7px;font-weight:600;transition:.2s;color:rgba(255,255,255,.2);background:rgba(255,255,255,.03)}
.so-h .src:hover{color:rgba(255,255,255,.4);background:rgba(255,255,255,.06)}
.so-h .src.on{background:var(--prim)!important;color:#000!important}
.so-h .cls{background:none;border:none;color:rgba(255,255,255,.15);cursor:pointer;font-size:18px;padding:4px;transition:.2s}
.so-h .cls:hover{color:#fff}
.so-r{flex:1;overflow-y:auto;background:rgba(16,16,24,.85);border:1px solid rgba(255,255,255,.05);border-top:none;border-radius:0 0 16px 16px;padding:8px;backdrop-filter:blur(20px)}
.so-r .no{text-align:center;padding:40px 10px;color:rgba(255,255,255,.1);font-size:12px}
.so-r .re{display:flex;align-items:center;gap:12px;padding:9px 12px;border-radius:9px;cursor:pointer;transition:.15s}
.so-r .re:hover{background:rgba(255,255,255,.04)}
.so-r .re .im{width:36px;height:52px;border-radius:5px;overflow:hidden;flex-shrink:0;background:rgba(0,0,0,.2);display:flex;align-items:center;justify-content:center;font-size:10px;color:rgba(255,255,255,.05)}
.so-r .re .im img{width:100%;height:100%;object-fit:cover;display:block}
.so-r .re .nf{flex:1;min-width:0}
.so-r .re .nf .nm{font-size:12px;font-weight:600}
.so-r .re .nf .tp{font-size:9px;color:rgba(255,255,255,.15);margin-top:1px}
.so-r .re .nf .ex{font-size:9px;color:rgba(255,255,255,.1);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ====== DETAIL MODAL ====== */
.dm{position:fixed;top:0;left:0;width:100%;height:100%;z-index:600;display:none;align-items:center;justify-content:center}
.dm.on{display:flex;animation:fi .2s}
.dm .bg{position:absolute;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(20px)}
.dm .mdl{position:relative;background:rgba(16,16,24,.92);border:1px solid rgba(255,255,255,.05);border-radius:18px;padding:0;max-width:420px;width:90%;max-height:85vh;overflow-y:auto;box-shadow:0 30px 80px rgba(0,0,0,.5);backdrop-filter:blur(30px);animation:su .3s}
.dm .mdl .hdr{display:flex;gap:16px;padding:20px 20px 14px;align-items:flex-start;background:linear-gradient(180deg,rgba(255,255,255,.02),transparent)}
.dm .mdl .hdr .im{width:90px;height:135px;border-radius:10px;overflow:hidden;flex-shrink:0;background:rgba(0,0,0,.2);box-shadow:0 8px 30px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;font-size:24px;color:rgba(255,255,255,.05)}
.dm .mdl .hdr .im img{width:100%;height:100%;object-fit:cover;display:block}
.dm .mdl .hdr .if{flex:1;min-width:0}
.dm .mdl .hdr .if .nm{font-size:17px;font-weight:700;margin-bottom:3px;line-height:1.2}
.dm .mdl .hdr .if .tp{font-size:10px;color:rgba(255,255,255,.2);text-transform:uppercase;letter-spacing:.5px}
.dm .mdl .hdr .if .yr{font-size:11px;color:rgba(255,255,255,.15);margin-top:3px}
.dm .mdl .bd2{padding:0 20px 20px}
.dm .mdl .bd2 label{font-size:9px;color:rgba(255,255,255,.15);text-transform:uppercase;letter-spacing:.8px;display:block;margin:12px 0 4px;font-weight:600}
.dm .mdl .bd2 textarea{width:100%;padding:9px 12px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);border-radius:9px;color:#fff;font-size:12px;font-family:inherit;resize:vertical;min-height:60px;outline:none;transition:.2s}
.dm .mdl .bd2 textarea:focus{border-color:var(--prim);box-shadow:0 0 20px color-mix(in srgb,var(--prim) 10%,transparent)}
.dm .mdl .bd2 .ra{display:flex;gap:5px;align-items:center;margin:4px 0;flex-wrap:wrap}
.dm .mdl .bd2 .ra button{width:36px;height:36px;border-radius:9px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.04);color:rgba(255,255,255,.15);cursor:pointer;font-size:13px;font-weight:700;transition:.2s;font-family:inherit}
.dm .mdl .bd2 .ra button:hover{border-color:rgba(255,255,255,.1);color:#fff;transform:translateY(-1px)}
.dm .mdl .bd2 .ra button.on{background:var(--prim);color:#000;border-color:var(--prim);box-shadow:0 4px 15px color-mix(in srgb,var(--prim) 30%,transparent);transform:scale(1.05)}
.dm .mdl .bd2 .btns{display:flex;gap:6px;margin-top:14px;justify-content:flex-end}
.dm .mdl .bd2 .btns button{padding:8px 18px;border-radius:9px;border:none;cursor:pointer;font-size:11px;font-weight:600;font-family:inherit;transition:.2s}
.dm .mdl .bd2 .btns .ok{background:var(--prim);color:#000}
.dm .mdl .bd2 .btns .ok:hover{transform:translateY(-1px);box-shadow:0 4px 15px color-mix(in srgb,var(--prim) 30%,transparent)}
.dm .mdl .bd2 .btns .no{background:rgba(255,255,255,.05);color:rgba(255,255,255,.3)}
.dm .mdl .bd2 .btns .no:hover{background:rgba(255,255,255,.08);color:#fff}
.dm .mdl .bd2 .btns .bd{background:rgba(231,76,60,.08);color:#e74c3c}
.dm .mdl .bd2 .btns .bd:hover{background:rgba(231,76,60,.15)}

/* ====== CUSTOMIZE MODAL ====== */
.cm{position:fixed;top:0;left:0;width:100%;height:100%;z-index:700;display:none;align-items:center;justify-content:center}
.cm.on{display:flex;animation:fi .2s}
.cm .bg{position:absolute;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(20px)}
.cm .mdl{position:relative;background:rgba(16,16,24,.92);border:1px solid rgba(255,255,255,.05);border-radius:16px;padding:22px;max-width:360px;width:90%;backdrop-filter:blur(30px);animation:su .25s}
.cm .mdl h2{font-size:16px;font-weight:700;margin-bottom:16px}
.cm .mdl .grp{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.cm .mdl .grp label{font-size:11px;font-weight:500;min-width:85px;color:rgba(255,255,255,.6)}
.cm .mdl .grp input[type=color]{width:38px;height:38px;border-radius:9px;border:1px solid rgba(255,255,255,.05);padding:0;cursor:pointer;background:none}
.cm .mdl .grp input[type=range]{flex:1;height:3px;-webkit-appearance:none;background:rgba(255,255,255,.06);border-radius:3px;outline:none}
.cm .mdl .grp input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--prim);cursor:pointer;box-shadow:0 0 15px color-mix(in srgb,var(--prim) 30%,transparent)}

<script>
// ====== DATA ======
var entries=[],filter='all',view='grid'
var KEY='kf_series3',CFG_KEY='kf_series3_cfg'
var config={prim:'#ff6b9d',sec:'#6b9dff',bg:'#0a0a1a',glass:5,bub:15,grad:''}
var detailId=null,searchTimer=null,buscandoFuente='jikan'
var GRAD_ENABLED=false

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}

function cargar(){
  try{var d=JSON.parse(localStorage.getItem(KEY));if(d)entries=d.entries||[]}catch(e){}
  try{var c=JSON.parse(localStorage.getItem(CFG_KEY));if(c){config=c;aplicarColores()}}catch(e){}
  // Migrate: assign topPos for entries with rating>0 that don't have it
  var needsPos=entries.filter(function(e){return e.rating>0&&!e.topPos})
  if(needsPos.length){
    needsPos.sort(function(a,b){return(b.rating||0)-(a.rating||0)})
    needsPos.forEach(function(e){e.topPos=topPosNext()})
    guardar()
  }
}

function guardar(){
  try{localStorage.setItem(KEY,JSON.stringify({entries:entries}))}catch(e){}
  try{localStorage.setItem(CFG_KEY,JSON.stringify(config))}catch(e){}
}

function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
function escAttr(s){return(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#039;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

// ====== COLORS ======
function aplicarColores(){
  document.documentElement.style.setProperty('--prim',config.prim)
  document.documentElement.style.setProperty('--sec',config.sec||'#6b9dff')
  document.documentElement.style.setProperty('--bg',config.bg)
  var g=Math.round(config.glass/100*255)
  document.documentElement.style.setProperty('--glass','rgba(255,255,255,'+(config.glass/100)+')')
  document.documentElement.style.setProperty('--bub-op',(config.bub/100))
  if(config.grad&&config.grad!==''){document.body.style.background=config.grad}else{document.body.style.background=config.bg}
}
function aplicarColor(k,v){config[k]=v;aplicarColores();guardar()}
function aplicarGlass(v){config.glass=+v;document.getElementById('cGlassV').textContent=v+'%';aplicarColores();guardar()}
function aplicarBub(v){config.bub=+v;document.getElementById('cBubV').textContent=v+'%';aplicarColores();guardar()}
function aplicarGrad(v){config.grad=v;aplicarColores();guardar()}
function resetColores(){
  config={prim:'#ff6b9d',sec:'#6b9dff',bg:'#0a0a1a',glass:5,bub:15,grad:''}
  document.getElementById('cPrim').value=config.prim
  document.getElementById('cSec').value=config.sec
  document.getElementById('cBg').value=config.bg
  document.getElementById('cGlass').value=config.glass
  document.getElementById('cGlassV').textContent=config.glass+'%'
  document.getElementById('cBub').value=config.bub
  document.getElementById('cBubV').textContent=config.bub+'%'
  document.getElementById('cGrad').value=''
  aplicarColores();guardar()
}

// ====== SEARCH ======
function abrirBusqueda(){
  document.getElementById('searchOverlay').classList.add('on')
  document.getElementById('searchInput').value=''
  document.getElementById('searchResults').innerHTML='<div class="no">Escribe para buscar...</div>'
  document.querySelectorAll('.so-h .src').forEach(function(b){b.classList.toggle('on',b.dataset.src===buscandoFuente)})
  setTimeout(function(){document.getElementById('searchInput').focus()},200)
}
function cerrarBusqueda(){document.getElementById('searchOverlay').classList.remove('on')}
function cambiarFuente(f){buscandoFuente=f;document.querySelectorAll('.so-h .src').forEach(function(b){b.classList.toggle('on',b.dataset.src===f)});var q=document.getElementById('searchInput').value.trim();if(q.length>=2)buscar(q)}

function debouncedSearch(q){clearTimeout(searchTimer);if(q.length<2){document.getElementById('searchResults').innerHTML='<div class="no">Minimo 2 caracteres</div>';return};searchTimer=setTimeout(function(){buscar(q)},350)}

function buscar(q){
  var el=document.getElementById('searchResults')
  el.innerHTML='<div class="no">Buscando...</div>'
  if(buscandoFuente==='jikan')buscarJikan(q,el)
  else buscarTVmaze(q,el)
}

function buscarJikan(q,el){
  var xhr=new XMLHttpRequest()
  xhr.open('GET','https://api.jikan.moe/v4/anime?q='+encodeURIComponent(q)+'&limit=18&sfw=true')
  xhr.onload=function(){
    if(xhr.status!==200){el.innerHTML='<div class="no">Error del servidor (Jikan)</div>';return}
    var data=JSON.parse(xhr.responseText).data
    if(!data||!data.length){el.innerHTML='<div class="no">Sin resultados en MyAnimeList</div>';return}
    el.innerHTML=data.map(function(a){
      var img=a.images&&a.images.jpg&&a.images.jpg.image_url?escAttr(a.images.jpg.image_url):''
      var title=esc(a.title||a.title_english||'?')
      var type=esc(a.type||'Anime')
      var year=a.year||(a.aired&&a.aired.from?a.aired.from.slice(0,4):'')
      return '<div class="re" data-id="'+a.mal_id+'" data-title="'+escAttr(a.title)+'" data-titlen="'+escAttr(a.title_english||'')+'" data-type="'+escAttr(a.type||'Anime')+'" data-year="'+escAttr(year)+'" data-img="'+escAttr(img)+'" data-source="jikan">'+
        '<div class="im">'+(img?'<img src="'+img+'">':'<span style="font-size:16px;opacity:.3">?</span>')+'</div>'+
        '<div class="nf"><div class="nm">'+title+'</div><div class="tp">'+type+(year?' &middot; '+year:'')+'</div></div></div>'
    }).join('')
  }
  xhr.onerror=function(){el.innerHTML='<div class="no">Error de conexion</div>'}
  xhr.send()
}

function buscarTVmaze(q,el){
  var xhr=new XMLHttpRequest()
  xhr.open('GET','https://api.tvmaze.com/search/shows?q='+encodeURIComponent(q))
  xhr.onload=function(){
    if(xhr.status!==200){el.innerHTML='<div class="no">Error del servidor (TVmaze)</div>';return}
    var data=JSON.parse(xhr.responseText)
    if(!data||!data.length){el.innerHTML='<div class="no">Sin resultados en TVmaze</div>';return}
    el.innerHTML=data.map(function(item,i){
      var s=item.show
      var img=s.image&&s.image.medium?escAttr(s.image.medium):''
      var title=esc(s.name||'?')
      var type=s.type==='Reality'?'Reality':s.type==='Scripted'?'Serie':s.type==='Documentary'?'Documental':'Serie'
      var year=s.premiered?s.premiered.slice(0,4):''
      var summary=esc((s.summary||'').replace(/<[^>]+>/g,'').slice(0,80))
      return '<div class="re" data-id="tv'+i+'_'+s.id+'" data-title="'+escAttr(s.name)+'" data-type="'+escAttr(type)+'" data-year="'+escAttr(year)+'" data-img="'+escAttr(img)+'" data-source="tvmaze">'+
        '<div class="im">'+(img?'<img src="'+img+'">':'<span style="font-size:16px;opacity:.3">?</span>')+'</div>'+
        '<div class="nf"><div class="nm">'+title+'</div><div class="tp">'+type+(year?' &middot; '+year:'')+'</div>'+
        (summary?'<div class="ex">'+summary+'</div>':'')+'</div></div>'
    }).join('')
  }
  xhr.onerror=function(){el.innerHTML='<div class="no">Error de conexion</div>'}
  xhr.send()
}

document.getElementById('searchResults').addEventListener('click',function(e){
  var re=e.target.closest('.re')
  if(!re)return
  var source=re.dataset.source
  if(source==='jikan')agregarDesdeJikan(re)
  else agregarDesdeTVmaze(re)
})

function agregarDesdeJikan(re){
  var malId=re.dataset.id,titulo=re.dataset.title,tituloEn=re.dataset.titlen,tipo=re.dataset.type,anio=re.dataset.year,img=re.dataset.img
  var exists=entries.find(function(e){return e.malId==malId||e.titulo===titulo})
  if(exists){cerrarBusqueda();abrirDetalle(exists.id);return}
  var id=uid()
  entries.push({id:id,malId:String(malId),titulo:titulo,tituloEn:tituloEn,tipo:tipo||'Anime',anio:anio,img:img,rating:0,desc:'',createdAt:new Date().toISOString()})
  guardar();cerrarBusqueda();render();abrirDetalle(id)
}

function agregarDesdeTVmaze(re){
  var titulo=re.dataset.title,tipo=re.dataset.type,anio=re.dataset.year,img=re.dataset.img
  var exists=entries.find(function(e){return e.titulo===titulo})
  if(exists){cerrarBusqueda();abrirDetalle(exists.id);return}
  var id=uid()
  entries.push({id:id,malId:'',titulo:titulo,tituloEn:'',tipo:tipo||'Serie',anio:anio,img:img,rating:0,desc:'',createdAt:new Date().toISOString()})
  guardar();cerrarBusqueda();render();abrirDetalle(id)
}

// ====== ADD MANUAL ======
function abrirAdd(){
  document.getElementById('addTitle').value=''
  document.getElementById('addType').value='Anime'
  document.getElementById('addImg').value=''
  document.getElementById('addModal').classList.add('on')
  setTimeout(function(){document.getElementById('addTitle').focus()},200)
}
function cerrarAdd(){document.getElementById('addModal').classList.remove('on')}
function guardarAdd(){
  var titulo=document.getElementById('addTitle').value.trim()
  var tipo=document.getElementById('addType').value.trim()||'Anime'
  var img=document.getElementById('addImg').value.trim()
  if(!titulo){alert('Escribe un titulo');return}
  var id=uid()
  entries.push({id:id,malId:'',titulo:titulo,tituloEn:'',tipo:tipo,anio:'',img:img,rating:0,desc:'',createdAt:new Date().toISOString()})
  guardar();cerrarAdd();render();abrirDetalle(id)
}

// ====== DETAIL ======
function abrirDetalle(id){
  var e=entries.find(function(x){return x.id===id})
  if(!e)return
  detailId=id
  document.getElementById('detImg').innerHTML=e.img?'<img src="'+e.img+'">':'?'
  document.getElementById('detTitulo').textContent=e.titulo
  document.getElementById('detTipo').textContent=e.tipo+(e.anio?' &middot; '+e.anio:'')
  document.getElementById('detAnio').textContent=e.tituloEn?'Tambien: '+e.tituloEn:''
  document.getElementById('detDesc').value=e.desc||''
  document.getElementById('detImgUrl').value=e.img||''
  document.getElementById('ratingSlider').value=e.rating||0
  document.getElementById('ratingVal').textContent=e.rating?e.rating.toFixed(1):'-'
  var sel=document.getElementById('detTopPos')
  sel.innerHTML='<option value="0">Fuera del Top</option>'
  for(var i=1;i<=20;i++){
    var o=document.createElement('option')
    o.value=i;o.textContent='#'+i+(entries.find(function(x){return x.topPos===i&&x.id!==e.id})?' (ocupado)':'')
    if(e.topPos===i)o.selected=true
    sel.appendChild(o)
  }
  document.getElementById('detailModal').classList.add('on')
}
function cerrarDetalle(){document.getElementById('detailModal').classList.remove('on');detailId=null}
function ponerSlider(v){
  var e=entries.find(function(x){return x.id===detailId})
  if(!e)return
  var r=parseFloat(v)
  if(r>0&&!e.topPos){var n=topPosNext();if(n){e.topPos=n;var sel=document.getElementById('detTopPos');if(sel)sel.value=n}}
  if(r===0)delete e.rating;else e.rating=r
  guardar()
  document.getElementById('ratingVal').textContent=r?r.toFixed(1):'-'
  render()
}
function ponerTopPos(v){
  var e=entries.find(function(x){return x.id===detailId})
  if(!e)return
  var p=parseInt(v,10)||0
  if(p>0&&!e.rating){e.rating=0.5;document.getElementById('ratingSlider').value=0.5;document.getElementById('ratingVal').textContent='0.5'}
  if(p===0){delete e.topPos;guardar();render();return}
  var conflict=entries.find(function(x){return x.topPos===p&&x.id!==e.id})
  if(conflict)delete conflict.topPos
  e.topPos=p
  guardar();render()
}
function guardarDetalle(close){
  var e=entries.find(function(x){return x.id===detailId})
  if(!e)return;e.desc=document.getElementById('detDesc').value
  var newImg=document.getElementById('detImgUrl').value.trim()
  if(newImg!==e.img){e.img=newImg;document.getElementById('detImg').innerHTML=newImg?'<img src="'+newImg+'">':'?'}
  guardar();render()
  if(close)cerrarDetalle()
}
function borrarEntrada(){
  if(!confirm('Eliminar esta entrada?'))return
  entries=entries.filter(function(x){return x.id!==detailId})
  guardar();render();cerrarDetalle()
}

// ====== FILTER & RENDER ======
function filtrar(f){
  filter=f
  document.querySelectorAll('.sb .it').forEach(function(el){el.classList.toggle('on',el.dataset.filter===f)})
  render()
}
function cambiarVista(v){
  view=v
  document.querySelectorAll('.fl button').forEach(function(el){el.classList.toggle('on',el.dataset.v===v)})
  render()
}

function render(){
  document.getElementById('ctAll').textContent=entries.length
  document.getElementById('ctTop').textContent=Math.min(entries.filter(function(e){return e.topPos>0}).length,20)
  var tipos={}
  entries.forEach(function(e){tipos[e.tipo]=tipos[e.tipo]||0;tipos[e.tipo]++})
  document.getElementById('ctAnime').textContent=tipos.Anime||0
  document.getElementById('ctSerie').textContent=(tipos.Serie||0)+(tipos.TV||0)+(tipos['TV']||0)
  document.getElementById('ctMovie').textContent=tipos.Movie||0
  document.getElementById('ctOVA').textContent=tipos.OVA||0

  var titulo='Todas',sub=entries.length+' entradas'
  if(filter==='top'){titulo='Top 20 <button onclick="exportarTop()" style="font-size:10px;padding:3px 10px;border-radius:6px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.05);color:rgba(255,255,255,.3);cursor:pointer;font-family:inherit;font-weight:600;transition:.2s;vertical-align:middle" onmouseover="this.style.color=\'#fff\';this.style.borderColor=\'var(--prim)\'" onmouseout="this.style.color=\'rgba(255,255,255,.3)\';this.style.borderColor=\'rgba(255,255,255,.05)\'">📷 Exportar imagen</button>';sub='Tu seleccion manual'}
  else if(filter!=='all'){titulo=filter;sub=(tipos[filter]||0)+' entradas'}
  document.getElementById('ctTitle').innerHTML=titulo
  document.getElementById('ctSub').textContent=sub

  var content=document.getElementById('ctContent')
  if(!entries.length){
    content.innerHTML='<div class="emp"><div class="ic">📺</div><h3>No hay series</h3><p>Busca o anade manualmente tus favoritas</p><button onclick="abrirAdd()">+ Anadir manual</button></div>'
    return
  }
  var list=filtrarEntradas()
  if(filter==='top'){renderTop(list,content);return}
  else if(view==='grid')renderGrid(list,content)
  else renderList(list,content)
}

function topPosNext(){var used={};entries.forEach(function(e){if(e.topPos)used[e.topPos]=1});for(var i=1;i<=20;i++){if(!used[i])return i}return 0}

function filtrarEntradas(){
  var list=[].concat(entries)
  if(filter==='top')list=list.filter(function(e){return e.topPos>0}).sort(function(a,b){return a.topPos-b.topPos}).slice(0,20)
  else if(filter!=='all'){filter === 'Serie' ? list=list.filter(function(e){return e.tipo==='Serie'||e.tipo==='TV'||e.tipo==='Reality'||e.tipo==='Documental'}) : list=list.filter(function(e){return e.tipo===filter})}
  return list
}

function renderGrid(list,el){
  el.innerHTML='<div class="gr">'+list.map(function(e,i){
    var img=e.img?'<img src="'+e.img+'">':''
    return '<div class="cd" style="animation-delay:'+(i*45)+'ms" onclick="abrirDetalle(\''+e.id+'\')">'+
      '<div class="img">'+img+(e.rating?'<div class="rt show">'+e.rating+'<span style="font-size:8px;opacity:.5">/10</span></div>':'')+'</div>'+
      '<div class="bd"><div class="nm">'+esc(e.titulo)+'</div><div class="tp">'+esc(e.tipo)+(e.anio?' &middot; '+e.anio:'')+'</div>'+
      '<div class="rt2"><span class="ns" style="color:var(--prim)">'+(e.rating?e.rating:'<span style="font-size:11px;color:rgba(255,255,255,.1);font-weight:400">-</span>')+'</span><span class="st">'+(e.rating?'/10':'sin puntuar')+'</span></div>'+
      '</div><button class="del" onclick="event.stopPropagation();borrarDirecto(\''+e.id+'\')">✕</button></div>'
  }).join('')+'</div>'
}

function renderList(list,el){
  el.innerHTML='<div class="lv">'+list.map(function(e,i){
    var img=e.img?'<img src="'+e.img+'">':''
    return '<div class="li" style="animation-delay:'+(i*25)+'ms" onclick="abrirDetalle(\''+e.id+'\')">'+
      '<div class="im">'+img+'</div>'+
      '<div class="nf"><div class="nm">'+esc(e.titulo)+'</div><div class="tp">'+esc(e.tipo)+(e.anio?' &middot; '+e.anio:'')+'</div></div>'+
      (e.rating?'<div class="rt">'+e.rating+'</div>':'<div class="no-rt">-</div>')+
      '<button class="del2" onclick="event.stopPropagation();borrarDirecto(\''+e.id+'\')">✕</button></div>'
  }).join('')+'</div>'
}

function moverTop(id,dir){
  var top=entries.filter(function(e){return e.topPos>0}).sort(function(a,b){return a.topPos-b.topPos}).slice(0,20)
  var idx=top.findIndex(function(e){return e.id===id})
  if(idx<0||(dir<0&&idx===0)||(dir>0&&idx===top.length-1))return
  var t=top[idx].topPos;top[idx].topPos=top[idx+dir].topPos;top[idx+dir].topPos=t
  guardar();render()
}

function renderTop(list,el){
  // Build lookup of entries by topPos
  var slotMap={}
  list.forEach(function(e){slotMap[e.topPos]=e})
  var html='<div class="tl-l">'
  for(var i=1;i<=20;i++){
    var e=slotMap[i]
    var rkClass=i===1?'gold':i===2?'silver':i===3?'bronze':''
    if(e){
      var img=e.img?'<img src="'+e.img+'">':''
      html+='<div class="tl-i" draggable="true" data-id="'+e.id+'" style="animation-delay:'+(i*30)+'ms">'+
        '<div class="rk '+rkClass+'">'+i+'</div>'+
        '<div class="im">'+img+'</div>'+
        '<div class="nf"><div class="nm">'+esc(e.titulo)+'</div><div class="tp">'+esc(e.tipo)+(e.anio?' &middot; '+e.anio:'')+'</div></div>'+
        '<div class="rt">'+e.rating+'</div>'+
        '<div class="act">'+
        '<button onclick="event.stopPropagation();abrirDetalle(\''+e.id+'\')" title="Editar">✎</button>'+
        '<button onclick="event.stopPropagation();moverTopSlot(\''+e.id+'\','+(i-1)+')" title="Subir">▲</button>'+
        '<button onclick="event.stopPropagation();moverTopSlot(\''+e.id+'\','+(i+1)+')" title="Bajar">▼</button>'+
        '<button onclick="event.stopPropagation();sacarDelTop(\''+e.id+'\')" title="Quitar del top" style="color:#e74c3c">✕</button></div></div>'
    } else {
      html+='<div class="tl-i empty" onclick="abrirPicker('+i+')" style="animation-delay:'+(i*30)+'ms;cursor:pointer">'+
        '<div class="rk '+rkClass+'">'+i+'</div>'+
        '<div class="nf" style="flex:1;text-align:center;padding:6px 0"><span style="font-size:11px;color:rgba(255,255,255,.08);font-weight:500">+ Añadir</span></div></div>'
    }
  }
  html+='</div>'
  el.innerHTML=html
  // Drag & drop on filled slots
  var items=el.querySelectorAll('.tl-i[draggable]')
  items.forEach(function(item){
    item.addEventListener('dragstart',function(e){e.dataTransfer.setData('text/plain',this.dataset.id);this.style.opacity='.4'})
    item.addEventListener('dragover',function(e){e.preventDefault()})
    item.addEventListener('dragend',function(){this.style.opacity='1'})
    item.addEventListener('drop',function(e){
      e.preventDefault()
      var dragId=e.dataTransfer.getData('text/plain')
      if(!dragId)return
      var top=entries.filter(function(e){return e.topPos>0})
      var from=top.find(function(x){return x.id===dragId})
      var targetSlot=parseInt(this.querySelector('.rk').textContent,10)
      if(!from||!targetSlot)return
      var target=entries.find(function(x){return x.topPos===targetSlot})
      if(target&&target.id===from.id)return
      if(target){
        target.topPos=from.topPos
      }
      from.topPos=targetSlot
      guardar();render()
    })
  })
}

function moverTopSlot(id,newPos){
  if(newPos<1||newPos>20)return
  var e=entries.find(function(x){return x.id===id})
  if(!e)return
  var conflict=entries.find(function(x){return x.topPos===newPos&&x.id!==id})
  if(conflict)conflict.topPos=e.topPos
  e.topPos=newPos
  guardar();render()
}

function sacarDelTop(id){
  var e=entries.find(function(x){return x.id===id})
  if(!e)return
  delete e.topPos
  guardar();render()
}

// ====== EXPORT IMAGE ======
function exportarTop(){
  var top=entries.filter(function(e){return e.topPos>0}).sort(function(a,b){return a.topPos-b.topPos}).slice(0,20)
  if(!top.length){alert('No hay nada en tu Top para exportar');return}
  var btn=document.querySelector('#ctTitle button')
  if(btn){btn.textContent='⏳ Generando...';btn.disabled=true}
  var W=900,H=Math.max(1200,380+Math.max(top.length-3,0)*58),pad=40
  var canvas=document.createElement('canvas');canvas.width=W;canvas.height=H
  var ctx=canvas.getContext('2d')
  function draw(){
    // Background
    var grad=ctx.createLinearGradient(0,0,0,H)
    grad.addColorStop(0,'#08081a');grad.addColorStop(0.5,'#0f0a24');grad.addColorStop(1,'#08081a')
    ctx.fillStyle=grad;ctx.fillRect(0,0,W,H)
    // Subtle dots
    ctx.fillStyle='rgba(255,255,255,.012)'
    for(var yy=0;yy<H;yy+=30){for(var xx=0;xx<W;xx+=30){ctx.beginPath();ctx.arc(xx,yy,1,0,Math.PI*2);ctx.fill()}}
    // Header bar
    ctx.fillStyle='rgba(255,255,255,.03)';ctx.fillRect(0,0,W,110)
    ctx.fillStyle='#fff';ctx.font='bold 32px Inter,sans-serif';ctx.textAlign='center'
    ctx.fillText('Mi Top 20',W/2,50)
    ctx.fillStyle='rgba(255,255,255,.12)';ctx.font='14px Inter,sans-serif'
    ctx.fillText('KaferSeries',W/2,78)
    // Decorative line
    var lw=120;ctx.strokeStyle='rgba(255,255,255,.04)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(W/2-lw,92);ctx.lineTo(W/2+lw,92);ctx.stroke()
    var yPos=140
    // Top 3 - big cards
    var bigW=230,bigH=150,bigGap=35,bigStart=(W-3*bigW-2*bigGap)/2
    var medals=['🥇','🥈','🥉'];var mColors=['#ffd700','#c0c0c0','#cd7f32'];var mTitles=['ORO','PLATA','BRONCE']
    for(var i=0;i<Math.min(3,top.length);i++){
      var e=top[i],x=bigStart+i*(bigW+bigGap)
      // Card shadow
      ctx.fillStyle='rgba(0,0,0,.3)';ctx.beginPath();ctx.roundRect(x+3,yPos+3,bigW,bigH,14);ctx.fill()
      // Card bg
      ctx.fillStyle='rgba(255,255,255,'+(0.04+i*0.005)+')'
      ctx.beginPath();ctx.roundRect(x,yPos,bigW,bigH,14);ctx.fill()
      ctx.strokeStyle=mColors[i]+'50';ctx.lineWidth=1.5;ctx.beginPath();ctx.roundRect(x,yPos,bigW,bigH,14);ctx.stroke()
      // Medal
      ctx.font='22px sans-serif';ctx.textAlign='center'
      ctx.fillText(medals[i],x+bigW/2,yPos-10)
      ctx.fillStyle=mColors[i];ctx.font='bold 9px Inter,sans-serif';ctx.textAlign='center'
      ctx.fillText(mTitles[i],x+bigW/2,yPos+5)
      // Image
      var imgX=x+12,imgY=yPos+16,imgW=58,imgH=82
      ctx.fillStyle='rgba(0,0,0,.2)';ctx.beginPath();ctx.roundRect(imgX,imgY,imgW,imgH,6);ctx.fill()
      var img=e._img
      if(img){ctx.save();ctx.beginPath();ctx.roundRect(imgX,imgY,imgW,imgH,6);ctx.clip();ctx.drawImage(img,imgX,imgY,imgW,imgH);ctx.restore()}
      // Title
      ctx.fillStyle='#fff';ctx.font='bold 14px Inter,sans-serif';ctx.textAlign='left'
      ctx.fillText((e.titulo||'?').slice(0,18),x+80,imgY+28)
      ctx.fillStyle='rgba(255,255,255,.25)';ctx.font='10px Inter,sans-serif'
      ctx.fillText(e.tipo||'',x+80,imgY+46)
      // Rating bar
      var barX=x+80,barY=imgY+60,barW=bigW-100,barH=6
      var pct=Math.min((e.rating||0)/10,1)
      ctx.fillStyle='rgba(255,255,255,.05)';ctx.beginPath();ctx.roundRect(barX,barY,barW,barH,3);ctx.fill()
      ctx.fillStyle=mColors[i];ctx.beginPath();ctx.roundRect(barX,barY,barW*pct,barH,3);ctx.fill()
      ctx.fillStyle=mColors[i];ctx.font='bold 18px Inter,sans-serif';ctx.textAlign='right'
      ctx.fillText(Math.round(pct*100)+'%',x+bigW-12,imgY+28)
    }
    yPos+=bigH+35
    // 4-20 rows
    for(var i=3;i<top.length;i++){
      var e=top[i],x=pad
      var rowH=50+(e._img?0:0)
      // Row
      ctx.fillStyle='rgba(255,255,255,.012)'
      ctx.beginPath();ctx.roundRect(x,yPos,W-2*pad,rowH,8);ctx.fill()
      ctx.strokeStyle='rgba(255,255,255,.025)';ctx.lineWidth=1;ctx.beginPath();ctx.roundRect(x,yPos,W-2*pad,rowH,8);ctx.stroke()
      // Position circle
      var circleY=yPos+rowH/2
      ctx.fillStyle='rgba(255,255,255,.04)'
      ctx.beginPath();ctx.arc(x+28,circleY,14,0,Math.PI*2);ctx.fill()
      ctx.fillStyle='rgba(255,255,255,.25)';ctx.font='bold 11px Inter,sans-serif';ctx.textAlign='center'
      ctx.fillText(''+(i+1),x+28,circleY+4)
      // Small image
      if(e._img){
        ctx.save();ctx.beginPath();ctx.roundRect(x+50,yPos+6,26,rowH-12,4);ctx.clip()
        ctx.drawImage(e._img,x+50,yPos+6,26,rowH-12);ctx.restore()
      }
      // Title
      ctx.fillStyle='#fff';ctx.font='bold 12px Inter,sans-serif';ctx.textAlign='left'
      ctx.fillText((e.titulo||'?').slice(0,40),x+86,yPos+rowH/2-3)
      ctx.fillStyle='rgba(255,255,255,.2)';ctx.font='9px Inter,sans-serif'
      ctx.fillText(e.tipo||'',x+86,yPos+rowH/2+13)
      // Rating bar mini
      var pct2=Math.min((e.rating||0)/10,1)
      var rBarX=x+86,rBarY=yPos+rowH-8,rBarW=130,rBarH=3
      ctx.fillStyle='rgba(255,255,255,.04)';ctx.beginPath();ctx.roundRect(rBarX,rBarY,rBarW,rBarH,2);ctx.fill()
      ctx.fillStyle='#ff6b9d';ctx.beginPath();ctx.roundRect(rBarX,rBarY,rBarW*pct2,rBarH,2);ctx.fill()
      // Percentage
      ctx.fillStyle='#ff6b9d';ctx.font='bold 15px Inter,sans-serif';ctx.textAlign='right'
      ctx.fillText(Math.round(pct2*100)+'%',W-pad-12,circleY+5)
      yPos+=rowH+7
    }
    // Footer
    ctx.fillStyle='rgba(255,255,255,.02)';ctx.fillRect(0,H-32,W,32)
    ctx.fillStyle='rgba(255,255,255,.05)';ctx.font='10px Inter,sans-serif';ctx.textAlign='center'
    ctx.fillText('KaferSeries — creado por KaferGGS',W/2,H-10)
    // Download
    var link=document.createElement('a')
    link.download='mi-top-20-kafer.png'
    canvas.toBlob(function(blob){link.href=URL.createObjectURL(blob);link.click();if(btn){btn.textContent='📷 Exportar imagen';btn.disabled=false}},'image/png')
  }
  // Pre-load images
  var pending=0
  top.forEach(function(e){
    if(!e.img)return
    pending++
    var img=new Image()
    img.crossOrigin='anonymous'
    img.onload=function(){e._img=img;pending--;if(!pending)draw()}
    img.onerror=function(){pending--;if(!pending)draw()}
    img.src=e.img
  })
  if(!pending)setTimeout(draw,100)
}

// ====== TOP PICKER ======
function abrirPicker(pos){
  var available=entries.filter(function(e){return e.titulo&&!e.topPos}).sort(function(a,b){return(b.rating||0)-(a.rating||0)})
  if(!available.length){alert('No hay series disponibles. Primero agrega y califica series.');return}
  var el=document.getElementById('pickerModal')
  document.getElementById('pickerPos').textContent='#'+pos
  document.getElementById('pickerList').innerHTML=available.map(function(e){
    var img=e.img?'<img src="'+e.img+'">':''
    return '<div class="pi" onclick="asignarTop(\''+e.id+'\','+pos+')">'+
      '<div class="im">'+img+'</div>'+
      '<div class="nf"><div class="nm">'+esc(e.titulo)+'</div><div class="tp">'+(e.rating?e.rating.toFixed(1):'sin puntuar')+'</div></div></div>'
  }).join('')
  el.classList.add('on')
}
function cerrarPicker(){document.getElementById('pickerModal').classList.remove('on')}
function asignarTop(id,pos){
  var e=entries.find(function(x){return x.id===id})
  if(!e)return
  var conflict=entries.find(function(x){return x.topPos===pos&&x.id!==id})
  if(conflict)conflict.topPos=e.topPos
  if(!e.topPos)e.topPos=pos;else e.topPos=pos
  guardar();cerrarPicker();render()
}

function borrarDirecto(id){
  if(!confirm('Eliminar?'))return
  entries=entries.filter(function(x){return x.id!==id})
  guardar();render()
}

// ====== CUSTOMIZE ======
function abrirCustom(){
  document.getElementById('cPrim').value=config.prim
  document.getElementById('cSec').value=config.sec||'#6b9dff'
  document.getElementById('cBg').value=config.bg
  document.getElementById('cGlass').value=config.glass
  document.getElementById('cGlassV').textContent=config.glass+'%'
  document.getElementById('cBub').value=config.bub
  document.getElementById('cBubV').textContent=config.bub+'%'
  document.getElementById('cGrad').value=config.grad||''
  document.getElementById('customModal').classList.add('on')
}
function cerrarCustom(){document.getElementById('customModal').classList.remove('on')}

// ====== INIT ======
cargar();aplicarColores();render()
</script>
