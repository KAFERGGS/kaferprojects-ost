<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>KaferVHS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:#06060c;color:#fff;font-family:'Inter',sans-serif;display:flex;flex-direction:column;user-select:none}

/* ====== TV ====== */
.tv-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:16px;min-height:0;position:relative}
.tv-frame{position:relative;border-radius:24px 24px 10px 10px;background:linear-gradient(150deg,#14141e,#0a0a10);padding:12px;box-shadow:0 30px 80px rgba(0,0,0,.8),inset 0 1px 0 rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.02);width:100%;max-width:900px;aspect-ratio:4/3}
.screen-wrap{position:relative;border-radius:8px;overflow:hidden;background:#000;width:100%;height:100%;border:1px solid rgba(255,255,255,.015)}
#display{width:100%;height:100%;display:block;touch-action:none}
.scanlines{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:3;background:repeating-linear-gradient(0deg,rgba(0,0,0,.35) 0,rgba(0,0,0,.35) 1px,transparent 1px,transparent 3px);mix-blend-mode:multiply}
.crt-shadow{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:4;background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,.5) 100%)}
.vhs-glitch{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5}
.tv-brand{position:absolute;bottom:4px;right:10px;font-size:6px;color:rgba(255,255,255,.03);letter-spacing:2px;font-weight:700;z-index:6;pointer-events:none}
.tv-foot{width:60%;height:14px;background:linear-gradient(150deg,#14141e,#0a0a10);border-radius:0 0 14px 14px;margin:-1px auto 0;border:1px solid rgba(255,255,255,.015);border-top:none}
.tv-legs{display:flex;gap:80px;margin-top:-1px;justify-content:center}
.tv-leg{width:16px;height:24px;background:linear-gradient(180deg,#14141e,#0a0a10);border-radius:0 0 5px 5px;border:1px solid rgba(255,255,255,.015);border-top:none}

/* ====== TOOLBAR ====== */
.toolbar{display:flex;align-items:center;gap:6px;padding:8px 16px;background:rgba(255,255,255,.01);border-top:1px solid rgba(255,255,255,.02);flex-wrap:wrap;justify-content:center;flex-shrink:0}
.btn{padding:5px 12px;border-radius:6px;border:none;cursor:pointer;font-size:10px;font-weight:600;font-family:inherit;transition:.15s;background:rgba(255,255,255,.03);color:rgba(255,255,255,.35);border:1px solid rgba(255,255,255,.03);white-space:nowrap}
.btn:hover{background:rgba(255,255,255,.06);color:#fff}
.btn.prim{background:#6b5bff;color:#000;border-color:transparent}
.btn.prim:hover{box-shadow:0 3px 15px rgba(107,91,255,.2)}
.btn.green{background:#22c55e;color:#000;border-color:transparent}
.btn.green:hover{box-shadow:0 3px 15px rgba(34,197,94,.2)}
.btn.danger{background:#ef4444;color:#fff;border-color:transparent}
.group{display:flex;align-items:center;gap:4px;padding:0 4px;border-right:1px solid rgba(255,255,255,.03)}
.group:last-child{border:none}
.group label{font-size:8px;color:rgba(255,255,255,.15);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.group input[type=range]{width:56px;height:2px;-webkit-appearance:none;background:rgba(255,255,255,.06);border-radius:2px;outline:none}
.group input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:#6b5bff;cursor:pointer}
.group .val{font-size:9px;color:rgba(255,255,255,.12);min-width:18px;text-align:right}
#fileInput{display:none}

@media(max-width:768px){
  .tv-wrap{padding:8px}
  .tv-frame{border-radius:16px 16px 8px 8px;padding:8px}
  .toolbar{padding:6px 8px;gap:4px}
  .group input[type=range]{width:40px}
  .btn{padding:4px 8px;font-size:9px}
  .group label{font-size:7px}
}
@media(max-width:480px){
  .toolbar{gap:3px}
  .group input[type=range]{width:32px}
  .btn{padding:3px 6px;font-size:8px}
}
</style>
</head>
<body>

<div class="tv-wrap">
  <div class="tv-frame">
    <div class="screen-wrap" id="screenWrap">
      <canvas id="display"></canvas>
      <div class="scanlines" id="scanlinesEl"></div>
      <div class="crt-shadow"></div>
      <div class="vhs-glitch" id="glitchEl"></div>
      <div class="tv-brand">KAFERVHS</div>
    </div>
  </div>
  <div class="tv-foot"></div>
  <div class="tv-legs"><div class="tv-leg"></div><div class="tv-leg"></div></div>
</div>

<div class="toolbar">
  <div class="group">
    <button class="btn prim" onclick="document.getElementById('fileInput').click()">📁</button>
    <button class="btn" onclick="zoomIn()">🔍+</button>
    <button class="btn" onclick="zoomOut()">🔍−</button>
    <button class="btn" onclick="resetView()">⟲</button>
  </div>
  <div class="group">
    <label>Escaneo</label><input type="range" min="0" max="100" value="60" id="sScan" oninput="act()"><span class="val" id="vScan">60</span>
  </div>
  <div class="group">
    <label>Ruido</label><input type="range" min="0" max="100" value="25" id="sNoise" oninput="act()"><span class="val" id="vNoise">25</span>
  </div>
  <div class="group">
    <label>RGB</label><input type="range" min="0" max="100" value="35" id="sRgb" oninput="act()"><span class="val" id="vRgb">35</span>
  </div>
  <div class="group">
    <label>Glitch</label><input type="range" min="0" max="100" value="20" id="sGlitch" oninput="act()"><span class="val" id="vGlitch">20</span>
  </div>
  <div class="group">
    <label>Curva</label><input type="range" min="0" max="100" value="50" id="sCurve" oninput="act()"><span class="val" id="vCurve">50</span>
  </div>
  <div class="group">
    <label>Parpadeo</label><input type="range" min="0" max="100" value="15" id="sFlicker" oninput="act()"><span class="val" id="vFlicker">15</span>
  </div>
  <div class="group">
    <button class="btn green" onclick="exportarGif()">🎞 GIF</button>
    <button class="btn" onclick="toggleAnim()" id="playBtn">⏸</button>
  </div>
</div>

<input type="file" id="fileInput" accept="image/*">

<div class="modal" id="exportModal">
  <div class="bg" onclick="cerrarExport()"></div>
  <div class="mdl2">
    <h3>🎞 Exportando GIF...</h3>
    <p id="exportStatus">Preparando...</p>
    <div class="bar"><div id="exportBar"></div></div>
    <button class="btn" onclick="cerrarExport()" style="display:none" id="exportClose">Cerrar</button>
  </div>
</div>

<style>
.modal{position:fixed;top:0;left:0;width:100%;height:100%;z-index:100;display:none;align-items:center;justify-content:center}
.modal.on{display:flex;animation:fi .2s}
.modal .bg{position:absolute;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(12px)}
.modal .mdl2{position:relative;background:rgba(16,16,24,.95);border:1px solid rgba(255,255,255,.04);border-radius:14px;padding:22px;max-width:320px;width:90%;text-align:center;z-index:1}
.modal .mdl2 h3{font-size:13px;margin-bottom:6px}
.modal .mdl2 p{font-size:11px;color:rgba(255,255,255,.2);margin-bottom:12px}
.modal .mdl2 .bar{width:100%;height:3px;background:rgba(255,255,255,.04);border-radius:2px;overflow:hidden;margin:8px 0}
.modal .mdl2 .bar div{height:100%;width:0%;background:#6b5bff;border-radius:2px;transition:.3s}
@keyframes fi{from{opacity:0}to{opacity:1}}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
<script>
var canvas=document.getElementById('display'),ctx=canvas.getContext('2d')
var W,H,ratio
var imgSrc=null,animando=true,frame=0,zoom=1,panX=0,panY=0
var lastPinchDist=0
var E={scan:60,noise:25,rgb:35,glitch:20,curve:50,flicker:15}

function resize(){
  var sw=document.getElementById('screenWrap')
  W=sw.clientWidth,H=sw.clientHeight
  // Use devicePixelRatio for crispness, capped
  var dpr=Math.min(window.devicePixelRatio||1,2)
  canvas.width=W*dpr;canvas.height=H*dpr
  canvas.style.width=W+'px';canvas.style.height=H+'px'
  ctx.imageSmoothingEnabled=false
  ratio=dpr
}
window.addEventListener('resize',resize)
resize()

function drawBg(){
  ctx.fillStyle='#08080e'
  ctx.fillRect(0,0,canvas.width,canvas.height)
  ctx.fillStyle='rgba(255,255,255,.012)'
  ctx.font=Math.round(18*ratio)+'px Inter,sans-serif'
  ctx.textAlign='center'
  ctx.fillText('📺 Suelta una imagen',canvas.width/2,canvas.height/2-10*ratio)
  ctx.font=Math.round(11*ratio)+'px Inter,sans-serif'
  ctx.fillStyle='rgba(255,255,255,.03)'
  ctx.fillText('o haz clic en 📁',canvas.width/2,canvas.height/2+14*ratio)
}
drawBg()

// ====== IMAGE ======
document.getElementById('fileInput').addEventListener('change',function(e){
  if(e.target.files[0])cargarImg(e.target.files[0])
})
var sw=document.getElementById('screenWrap')
sw.addEventListener('dragover',function(e){e.preventDefault()})
sw.addEventListener('drop',function(e){
  e.preventDefault()
  var f=e.dataTransfer.files[0]
  if(f&&f.type.startsWith('image/'))cargarImg(f)
})
document.addEventListener('paste',function(e){
  var t=(e.clipboardData||window.clipboardData).getData('text')
  if(t&&t.match(/\.(jpg|jpeg|png|gif|webp)/i)){
    var img=new Image();img.crossOrigin='anonymous'
    img.onload=function(){imgSrc=img}
    img.onerror=function(){}
    img.src=t
  }
})

function cargarImg(file){
  var r=new FileReader()
  r.onload=function(ev){
    var img=new Image()
    img.onload=function(){imgSrc=img;zoom=1;panX=0;panY=0}
    img.src=ev.target.result
  }
  r.readAsDataURL(file)
}

// ====== ZOOM & PAN (mouse wheel + pinch) ======
canvas.addEventListener('wheel',function(e){
  e.preventDefault()
  var old=zoom
  zoom*=e.deltaY<0?1.1:0.9
  zoom=Math.max(0.2,Math.min(5,zoom))
  // Adjust pan so point under cursor stays
  var r=canvas.getBoundingClientRect()
  var mx=(e.clientX-r.left)/W,my=(e.clientY-r.top)/H
  panX+=mx*(1/old-1/zoom)*W
  panY+=my*(1/old-1/zoom)*H
},{passive:false})

var dragging=false,lastX,lastY
canvas.addEventListener('mousedown',function(e){dragging=true;lastX=e.clientX;lastY=e.clientY})
window.addEventListener('mousemove',function(e){
  if(!dragging)return
  panX+=(e.clientX-lastX);panY+=(e.clientY-lastY)
  lastX=e.clientX;lastY=e.clientY
})
window.addEventListener('mouseup',function(){dragging=false})
canvas.addEventListener('touchstart',function(e){
  if(e.touches.length===1){dragging=true;lastX=e.touches[0].clientX;lastY=e.touches[0].clientY}
  if(e.touches.length===2){
    var dx=e.touches[0].clientX-e.touches[1].clientX
    var dy=e.touches[0].clientY-e.touches[1].clientY
    lastPinchDist=Math.sqrt(dx*dx+dy*dy)
  }
})
canvas.addEventListener('touchmove',function(e){
  e.preventDefault()
  if(e.touches.length===1&&dragging){
    panX+=(e.touches[0].clientX-lastX);panY+=(e.touches[0].clientY-lastY)
    lastX=e.touches[0].clientX;lastY=e.touches[0].clientY
  }
  if(e.touches.length===2){
    var dx=e.touches[0].clientX-e.touches[1].clientX
    var dy=e.touches[0].clientY-e.touches[1].clientY
    var dist=Math.sqrt(dx*dx+dy*dy)
    if(lastPinchDist){
      var old=zoom
      zoom*=dist/lastPinchDist
      zoom=Math.max(0.2,Math.min(5,zoom))
    }
    lastPinchDist=dist
  }
},{passive:false})
canvas.addEventListener('touchend',function(){dragging=false;lastPinchDist=0})

function zoomIn(){zoom=Math.min(5,zoom*1.3)}
function zoomOut(){zoom=Math.max(0.2,zoom/1.3)}
function resetView(){zoom=1;panX=0;panY=0}

// ====== EFFECTS ======
function act(){
  E.scan=+document.getElementById('sScan').value
  E.noise=+document.getElementById('sNoise').value
  E.rgb=+document.getElementById('sRgb').value
  E.glitch=+document.getElementById('sGlitch').value
  E.curve=+document.getElementById('sCurve').value
  E.flicker=+document.getElementById('sFlicker').value
  document.getElementById('vScan').textContent=E.scan
  document.getElementById('vNoise').textContent=E.noise
  document.getElementById('vRgb').textContent=E.rgb
  document.getElementById('vGlitch').textContent=E.glitch
  document.getElementById('vCurve').textContent=E.curve
  document.getElementById('vFlicker').textContent=E.flicker
}

// ====== RENDER LOOP ======
function render(){
  requestAnimationFrame(render)
  if(!animando)return
  frame++
  var w=canvas.width,h=canvas.height,r=ratio
  ctx.clearRect(0,0,w,h)

  // --- IMAGE ---
  if(imgSrc){
    ctx.save()
    ctx.translate(w/2+panX*r,h/2+panY*r)
    ctx.scale(zoom,zoom)
    var iw=imgSrc.width,ih=imgSrc.height
    var s=Math.min(w/ratio/iw,h/ratio/ih)
    ctx.imageSmoothingEnabled=false
    ctx.drawImage(imgSrc,-iw*s/2,-ih*s/2,iw*s,ih*s)
    ctx.restore()
  }else{drawBg();return}

  // --- CRT EFFECTS ---

  // 1. Chromatic aberration (RGB split)
  var rgbOff=E.rgb/100*4*r
  if(rgbOff>0.3){
    var id=ctx.getImageData(0,0,w,h)
    var d=id.data,tmp=new Uint8ClampedArray(d)
    var off=Math.round(rgbOff)
    for(var i=0;i<d.length;i+=4){
      d[i]=tmp[Math.max(0,i-off*4)]           // R ← left
      d[i+2]=tmp[Math.min(d.length-4,i+off*4)] // B → right
    }
    ctx.putImageData(id,0,0)
  }

  // 2. Scanlines
  var si=E.scan/100
  if(si>0.01){
    ctx.fillStyle='rgba(0,0,0,'+(si*0.25)+')'
    for(var y=0;y<h;y+=Math.round(3*r)){ctx.fillRect(0,y,w,Math.max(1,Math.round(1*r)))}
  }

  // 3. VHS Glitch
  var gi=E.glitch/100
  if(gi>0.01){
    // Horizontal shake
    if(frame%Math.round(30+Math.random()*40)<3){
      var shake=(Math.random()-0.5)*gi*12*r
      var gw=ctx.getImageData(Math.max(0,Math.round(shake)),0,w-Math.abs(Math.round(shake)),h)
      ctx.putImageData(gw,Math.max(0,-Math.round(shake)),0)
    }
    // Block corruption
    if(frame%Math.round(20+Math.random()*30)<2){
      var bx=Math.random()*w,by=Math.random()*h,bw=30*r+Math.random()*40*r,bh=2*r+Math.random()*6*r
      var blocks=ctx.getImageData(bx,by,bw,bh)
      for(var j=0;j<blocks.data.length;j+=4){
        if(Math.random()<0.3){
          var gv=Math.random()*255
          blocks.data[j]=gv;blocks.data[j+1]=gv;blocks.data[j+2]=gv
        }
      }
      ctx.putImageData(blocks,bx,by)
    }
    // Tracking lines
    if(frame%5<2){
      var ty=Math.random()*h
      ctx.fillStyle='rgba(255,255,255,'+(gi*0.03)+')'
      ctx.fillRect(0,ty,w,Math.round(1.5*r+Math.random()*3*r))
    }
  }

  // 4. Screen curvature vignette
  var ci=E.curve/100
  if(ci>0.01){
    var grad=ctx.createRadialGradient(w/2,h/2,w*0.2,w/2,h/2,w*0.75)
    grad.addColorStop(0,'rgba(0,0,0,0)')
    grad.addColorStop(1,'rgba(0,0,0,'+(ci*0.4)+')')
    ctx.fillStyle=grad;ctx.fillRect(0,0,w,h)
  }

  // 5. Noise
  var ni=E.noise/100
  if(ni>0.01&&frame%2===0){
    var id2=ctx.getImageData(0,0,w,h)
    var d2=id2.data
    for(var k=0;k<d2.length;k+=4){
      if(Math.random()<ni*0.12){
        var nv=Math.random()*255
        d2[k]=nv;d2[k+1]=nv;d2[k+2]=nv
      }
    }
    ctx.putImageData(id2,0,0)
  }

  // 6. Flicker
  var fi=E.flicker/100
  if(fi>0.01){
    var fl=Math.sin(frame*0.2)*fi*0.1
    ctx.fillStyle='rgba(0,0,0,'+Math.abs(fl)+')'
    ctx.fillRect(0,0,w,h)
    // Brightness flash
    if(frame%Math.round(60+Math.random()*80)<1){
      ctx.fillStyle='rgba(255,255,255,'+(fi*0.015)+')'
      ctx.fillRect(0,0,w,h)
    }
  }
}
render()

function toggleAnim(){
  animando=!animando
  document.getElementById('playBtn').textContent=animando?'⏸':'▶'
}

// ====== GIF EXPORT ======
function exportarGif(){
  if(!imgSrc){alert('Primero sube una imagen');return}
  var modal=document.getElementById('exportModal')
  var bar=document.getElementById('exportBar')
  var st=document.getElementById('exportStatus')
  var close=document.getElementById('exportClose')
  modal.classList.add('on');close.style.display='none'
  bar.style.width='0%'
  st.textContent='Preparando...'

  var total=30,fps=10
  var gif=new GIF({workers:2,quality:10,width:320,height:240,workerScript:'https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js'})
  var tc=document.createElement('canvas')
  tc.width=320;tc.height=240
  var tctx=tc.getContext('2d')
  tctx.imageSmoothingEnabled=false

  var i=0
  function add(){
    if(i>=total){
      st.textContent='Renderizando...'
      gif.on('progress',function(p){bar.style.width=Math.round(p*100)+'%'})
      gif.render();return
    }
    bar.style.width=Math.round((i/total)*100)+'%'
    st.textContent='Frame '+(i+1)+'/'+total
    tctx.clearRect(0,0,320,240)
    // Draw image
    var iw=imgSrc.width,ih=imgSrc.height
    var s=Math.min(320/iw,240/ih)
    tctx.drawImage(imgSrc,(320-iw*s)/2,(240-ih*s)/2,iw*s,ih*s)
    // Scanlines
    var si=E.scan/100
    if(si>0.01){
      tctx.fillStyle='rgba(0,0,0,'+(si*0.2)+')'
      for(var y=0;y<240;y+=3){tctx.fillRect(0,y,320,1)}
    }
    // RGB
    var rgbOff=E.rgb/100*2
    if(rgbOff>0.3){
      var id=tctx.getImageData(0,0,320,240)
      var d=id.data,tmp=new Uint8ClampedArray(d)
      var off=Math.round(rgbOff)
      for(var j=0;j<d.length;j+=4){
        d[j]=tmp[Math.max(0,j-off*4)]
        d[j+2]=tmp[Math.min(d.length-4,j+off*4)]
      }
      tctx.putImageData(id,0,0)
    }
    // Glitch
    var gi=E.glitch/100
    if(gi>0.01&&i%3===0){
      if(Math.random()<0.3){
        var shake=(Math.random()-0.5)*gi*6
        var gw=tctx.getImageData(Math.max(0,Math.round(shake)),0,320-Math.abs(Math.round(shake)),240)
        tctx.putImageData(gw,Math.max(0,-Math.round(shake)),0)
      }
    }
    // Curve
    var ci=E.curve/100
    if(ci>0.01){
      var g=tctx.createRadialGradient(160,120,50,160,120,170)
      g.addColorStop(0,'rgba(0,0,0,0)')
      g.addColorStop(1,'rgba(0,0,0,'+(ci*0.25)+')')
      tctx.fillStyle=g;tctx.fillRect(0,0,320,240)
    }
    // Noise
    var ni=E.noise/100
    if(ni>0.01&&i%2===0){
      var id2=tctx.getImageData(0,0,320,240)
      var d2=id2.data
      for(var k=0;k<d2.length;k+=4){
        if(Math.random()<ni*0.08){var v=Math.random()*255;d2[k]=v;d2[k+1]=v;d2[k+2]=v}
      }
      tctx.putImageData(id2,0,0)
    }
    // Flicker
    var fi=E.flicker/100
    if(fi>0.01){
      var fl=Math.sin(i*0.5)*fi*0.06
      tctx.fillStyle='rgba(0,0,0,'+Math.abs(fl)+')'
      tctx.fillRect(0,0,320,240)
    }
    gif.addFrame(tc,{delay:1000/fps,copy:true})
    i++;setTimeout(add,25)
  }
  add()
  gif.on('finished',function(blob){
    bar.style.width='100%'
    st.textContent='GIF listo!'
    close.style.display='inline-block'
    var url=URL.createObjectURL(blob)
    var a=document.createElement('a')
    a.href=url;a.download='kafervhs.gif'
    document.body.appendChild(a);a.click();a.remove()
    setTimeout(function(){URL.revokeObjectURL(url)},10000)
  })
}
function cerrarExport(){document.getElementById('exportModal').classList.remove('on')}
</script>
</body>
</html>
